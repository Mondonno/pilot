<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} | {{ .Site.Title }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            background-color: #fafafa;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: #2c3e50;
        }
        
        .price {
            font-size: 1.5rem;
            color: #27ae60;
            font-weight: bold;
            margin-bottom: 1rem;
        }
        
        .description {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 2rem;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .notion-container {
            margin: 2rem 0;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .notion-iframe {
            width: 100%;
            height: 80vh;
            border: none;
            display: block;
        }
        
        .buy-button-container {
            text-align: center;
            margin: 3rem 0;
        }
        
        .buy-button {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem 2rem;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .buy-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.6);
        }
        
        .back-link {
            display: inline-block;
            margin-bottom: 2rem;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .notion-iframe {
                height: 60vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Back to Ideas Hub</a>
        
        <div class="header">
            <h1>{{ .Title }}</h1>
            {{ if .Params.price }}
            <div class="price">${{ .Params.price }}</div>
            {{ end }}
            {{ if .Params.description }}
            <div class="description">{{ .Params.description }}</div>
            {{ end }}
        </div>
        
        {{ if .Params.notion_url }}
        <div class="notion-container">
            <iframe class="notion-iframe" src="{{ .Params.notion_url }}" title="{{ .Title }} - Notion Page"></iframe>
        </div>
        {{ end }}
        
        {{ if .Params.buy_link }}
        <div class="buy-button-container">
            <a href="{{ .Params.buy_link }}" class="buy-button" target="_blank" rel="noopener">
                Get This Idea for ${{ .Params.price | default "99" }}
            </a>
        </div>
        {{ end }}
        
        <div style="margin-top: 3rem;">
            {{ .Content }}
        </div>
    </div>
</body>
</html>
