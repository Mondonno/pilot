<style>
.ideas-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
    gap: 2rem;
    margin: 2rem 0;
}

.idea-card {
    background: white;
    border-radius: 12px;
    padding: 1.5rem;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    transition: all 0.3s ease;
    text-decoration: none;
    color: inherit;
    display: block;
}

.idea-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
    text-decoration: none;
    color: inherit;
}

.idea-title {
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
    color: #2c3e50;
}

.idea-price {
    font-size: 1.2rem;
    color: #27ae60;
    font-weight: bold;
    margin-bottom: 1rem;
}

.idea-description {
    color: #666;
    line-height: 1.5;
    margin-bottom: 1rem;
}

.idea-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 1rem;
}

.view-details {
    color: #667eea;
    font-weight: 500;
    font-size: 0.9rem;
}

@media (max-width: 768px) {
    .ideas-grid {
        grid-template-columns: 1fr;
        gap: 1.5rem;
    }
    
    .idea-card {
        padding: 1.25rem;
    }
}
</style>

<div class="ideas-grid">
{{ range where .Site.RegularPages "Section" "ideas" }}
    <a href="{{ .Permalink }}" class="idea-card">
        <div class="idea-title">{{ .Title }}</div>
        {{ if .Params.price }}
        <div class="idea-price">${{ .Params.price }}</div>
        {{ end }}
        {{ if .Params.description }}
        <div class="idea-description">{{ .Params.description | truncate 150 }}</div>
        {{ end }}
        <div class="idea-meta">
            <span class="view-details">View Details →</span>
        </div>
    </a>
{{ end }}
</div>
